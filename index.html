<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enviar mensaje</title>
<link rel="stylesheet" href="./css/index.css">
</head>
<body>

<div class="envelope">
  <div class="airmail-stripe"></div>
  <header>
    <div class="title-block">
      <h1>Enviar por correo</h1>
      <p>Texto + imagen &rarr;</p>
    </div>
    <div class="stamp">POR<br>AVIÓN</div>
  </header>

  <form id="mailForm" action="https://formspree.io/f/mlgypybg" method="POST">
    <div class="field">
      <label for="message">Mensaje</label>
      <textarea id="message" name="message" placeholder="Escribe aquí lo que quieres enviar..." required></textarea>
    </div>

    <div class="field">
      <label for="image">Imagen</label>
      <div class="drop" id="dropZone">
        <input type="file" id="image" accept="image/*">
        <div class="drop-text" id="dropText">Arrastra una imagen aquí o <b>haz clic para elegir</b></div>
      </div>
      <div class="preview" id="preview">
        <img id="previewImg" alt="Vista previa">
        <div class="fname" id="fileName"></div>
      </div>
      <input type="hidden" id="imageUrl" name="image_url">
    </div>

    <button type="submit" id="submitBtn">Enviar mensaje</button>
    <div class="status" id="status"></div>
  </form>

</div>

<script>
  const IMGBB_API_KEY = '6d00767b271df2d00dde787fa9df627d'; // consíguela gratis en https://api.imgbb.com/

  const form = document.getElementById('mailForm');
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('image');
  const preview = document.getElementById('preview');
  const previewImg = document.getElementById('previewImg');
  const fileName = document.getElementById('fileName');
  const dropText = document.getElementById('dropText');
  const status = document.getElementById('status');
  const submitBtn = document.getElementById('submitBtn');
  const imageUrlField = document.getElementById('imageUrl');
  let selectedFile = null;

  function showPreview(file){
    if(!file) return;
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      previewImg.src = e.target.result;
      fileName.textContent = file.name;
      preview.style.display = 'block';
      dropText.innerHTML = 'Imagen lista &mdash; <b>haz clic para cambiarla</b>';
    };
    reader.readAsDataURL(file);
  }

  fileInput.addEventListener('change', () => showPreview(fileInput.files[0]));

  ['dragenter','dragover'].forEach(evt =>
    dropZone.addEventListener(evt, e => { e.preventDefault(); dropZone.classList.add('drag'); })
  );
  ['dragleave','drop'].forEach(evt =>
    dropZone.addEventListener(evt, e => { e.preventDefault(); dropZone.classList.remove('drag'); })
  );
  dropZone.addEventListener('drop', e => {
    const file = e.dataTransfer.files[0];
    if(file){
      showPreview(file);
    }
  });

  async function uploadToImgBB(file){
    const data = new FormData();
    data.append('image', file);
    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
      method: 'POST',
      body: data
    });
    if(!res.ok) throw new Error('No se pudo subir la imagen');
    const json = await res.json();
    if(!json.success) throw new Error('ImgBB rechazó la imagen');
    return json.data.url;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    status.className = 'status';
    status.textContent = '';

    if(form.action.includes('TU_ID_DE_FORMSPREE')){
      status.className = 'status err';
      status.textContent = 'Falta configurar el endpoint de Formspree (ver instrucciones).';
      return;
    }
    if(selectedFile && IMGBB_API_KEY === 'TU_API_KEY_IMGBB'){
      status.className = 'status err';
      status.textContent = 'Falta configurar la API key de ImgBB (ver instrucciones).';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Enviando...';

    try{
      if(selectedFile){
        status.className = 'status';
        status.textContent = 'Subiendo imagen...';
        const url = await uploadToImgBB(selectedFile);
        imageUrlField.value = url;
      }

      status.textContent = 'Enviando mensaje...';
      const data = new FormData(form);
      const res = await fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      });

      if(res.ok){
        status.className = 'status ok';
        status.textContent = '✓ Mensaje enviado correctamente.';
        form.reset();
        preview.style.display = 'none';
        selectedFile = null;
        dropText.innerHTML = 'Arrastra una imagen aquí o <b>haz clic para elegir</b>';
      } else {
        status.className = 'status err';
        status.textContent = 'No se pudo enviar. Intenta de nuevo.';
      }
    } catch(err){
      status.className = 'status err';
      status.textContent = 'Error: ' + err.message;
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Enviar mensaje';
    }
  });
</script>

</body>
</html>
